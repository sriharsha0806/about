{{- $currentPage := . -}}
<div class="site-super-tabs" aria-label="Primary navigation">
  <nav class="site-super-tabs__nav">
    {{- range site.Menus.main }}
      {{- $menuItemURL := (cond (strings.HasSuffix .URL "/") .URL (printf "%s/" .URL)) | absLangURL -}}
      {{- $pageURL := $currentPage.Permalink | absLangURL -}}
      {{- $active := eq $menuItemURL $pageURL -}}
      <a class="site-super-tabs__link{{ if $active }} is-active{{ end }}" href="{{ .URL | relLangURL }}">{{ .Name }}</a>
    {{- end }}
  </nav>
  <button class="theme-toggle site-super-tabs__theme" accesskey="t" title="" aria-label="{{ i18n "theme_selector" }}">
    <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round" class="block dark:hidden">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round" class="hidden dark:block">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
  </button>
</div>
